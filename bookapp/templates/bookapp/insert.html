{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insert form</title>
    <link rel="stylesheet" href="{% static 'css/insert.css' %}">
</head>
<body>
    <fieldset>
        <center>
            <h2>BOOK INSERT FORM</h2>
            <form action="{% url 'insert' %}" method="post">
                {% csrf_token %}
                <table>
                    <tr>
                        <td><b>Book Name : </b></td>
                        <td><input type="text" name="bname" id="" placeholder="Enter book name"> </td>
                    </tr>

                    <tr>
                        <td><b>Book Author :</b> </td>
                        <td><input type="text" name="bauthor" id="" placeholder="Enter book author"> </td>
                    </tr>

                    <tr>
                        <td><b>Book page : </b></td>
                        <td><input type="text" name="bpage" id="" placeholder="Enter book page"> </td>
                    </tr>

                    <tr>
                        <td><b>Book Price :</b> </td>
                        <td><input type="text" name="bprice" id="" placeholder="Enter book price"> </td>
                    </tr>

                    <tr>
                        <td><input type="submit" value="INSERT"> </td>
                    </tr>
                </table>
            </form>
        </center>
    </fieldset>   
</body>
</html>
